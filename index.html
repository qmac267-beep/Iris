<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris AI 3D Bot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1f1f28;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #chat-interface {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 350px;
            max-height: 400px;
            background: rgba(31, 31, 40, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 184, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            color: #fff;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
            max-height: 300px;
            padding-right: 5px;
        }
        #chat-box::-webkit-scrollbar {
            width: 4px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 184, 255, 0.3);
            border-radius: 2px;
        }
        #input-container {
            display: flex;
            gap: 8px;
        }
        #user-input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 184, 255, 0.2);
            padding: 8px 12px;
            color: #fff;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }
        #user-input:focus {
            border-color: rgba(255, 184, 255, 0.6);
        }
        #send-btn {
            background: #ffb8ff;
            color: #1f1f28;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }
        #send-btn:hover {
            background: #ff99ff;
            box-shadow: 0 0 10px rgba(255, 184, 255, 0.5);
        }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.154.0/examples/jsm/loaders/GLTFLoader.js",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.2/lib/three-vrm.module.js"
        }
      }
    </script>
    <!-- ================================================================= -->
</head>
<body>

    <!-- Nơi chứa nhân vật 3D Iris -->
    <div id="canvas-container"></div>

    <!-- Khung Chat Interface -->
    <div id="chat-interface">
        <div id="chat-box"><b>Iris:</b> Xin chào chủ nhân! Hôm nay bạn cần Iris giúp gì không? 💜</div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Trò chuyện với Iris..." autocomplete="off">
            <button id="send-btn">Gửi</button>
        </div>
    </div>

    <!-- Nhúng file logic JavaScript -->
    <script type="module" src="main.js"></script>
</body>
</html>
