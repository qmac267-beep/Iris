<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý AI 3D - Iris</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #chat-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; background: rgba(30, 20, 40, 0.4);
            backdrop-filter: blur(12px); padding: 15px; border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); border: 1px solid rgba(138, 43, 226, 0.3); z-index: 10;
        }
        #chat-box { height: 120px; overflow-y: auto; color: white; margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        #input-container { display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(138, 43, 226, 0.3); background: rgba(0,0,0,0.3); color: white; outline: none; }
        #send-btn { padding: 10px 22px; background: #8a2be2; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #send-btn:hover { background: #a142f4; transform: scale(1.03); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="chat-container">
        <div id="chat-box"><b style="color: #d1a3ff">Iris:</b> Xin chào chủ nhân! Mình là Iris. Hôm nay bạn muốn trò chuyện gì với mình nè? 💕</div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button id="send-btn">Gửi</button>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
